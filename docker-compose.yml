services:
  behavior-detection:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_TYPE: cpu
    ports:
      - "8000:8000"    # FastAPI (frontend + backend + go2rtc proxy)
    volumes:
      - ./backend/data:/app/data          # Database, models, event screenshots, videos
      - ./backend/configs:/app/configs    # YAML config (for initial migration only)
    restart: unless-stopped
