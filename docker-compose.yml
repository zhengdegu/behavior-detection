services:
  behavior-detection:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_TYPE: cpu
    ports:
      - "18000:18000"   # FastAPI (frontend + backend + go2rtc proxy)
      - "1988:1984"    # go2rtc API/WebSocket (MSE fallback)
      - "18555:8555/tcp"  # go2rtc WebRTC TCP
      - "18555:8555/udp"  # go2rtc WebRTC UDP
    environment:
      # Set to your server's public IP (required for WebRTC ICE negotiation)
      - GO2RTC_WEBRTC_CANDIDATES=${SERVER_PUBLIC_IP:-}
    volumes:
      - ./backend/data:/app/data          # Database, models, event screenshots, videos
      - ./backend/configs:/app/configs    # YAML config (for initial migration only)
    restart: unless-stopped
